<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;1,14..32,300&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      background: #020408;
      font-family: 'Inter', system-ui, sans-serif;
      color: rgba(255,255,255,0.88);
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; position: relative; z-index: 1; }

    /* ── Scrollbar ─────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.22); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(96,165,250,0.4); }

    /* ── Grid ──────────────────────────── */
    .grid-bg {
      background-image:
        linear-gradient(rgba(59,130,246,0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.028) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    /* ── Glass surfaces ────────────────── */
    .glass {
      background: rgba(255,255,255,0.026);
      border: 1px solid rgba(255,255,255,0.065);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
    }
    .glass-user {
      background: rgba(96,165,250,0.1);
      border: 1px solid rgba(96,165,250,0.18);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .glass-ai {
      background: rgba(255,255,255,0.022);
      border: 1px solid rgba(255,255,255,0.055);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    /* ── Animations ────────────────────── */
    @keyframes borderPulse {
      0%,100% { border-color: rgba(59,130,246,0.12); }
      50%      { border-color: rgba(96,165,250,0.32); }
    }
    @keyframes orbFloat {
      0%,100% { transform: translateY(0)    scale(1);    }
      50%      { transform: translateY(-8px) scale(1.02); }
    }
    @keyframes orbGlow {
      0%,100% { opacity: 0.72; }
      50%      { opacity: 1;   }
    }
    @keyframes particleRise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      6%   { opacity: 0.8; }
      88%  { opacity: 0.28; }
      100% { transform: translateY(-110vh) translateX(16px) scale(0); opacity: 0; }
    }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(96,165,250,0.5);
      animation: particleRise linear infinite;
    }
    @keyframes statusPulse {
      0%,100% { box-shadow: 0 0 0 0   rgba(74,222,128,0.5); }
      50%      { box-shadow: 0 0 0 4px rgba(74,222,128,0);   }
    }
    .s-dot { animation: statusPulse 2.2s ease-in-out infinite; }

    @keyframes bounce3 {
      0%,60%,100% { transform: translateY(0);   }
      30%          { transform: translateY(-5px); }
    }
    .t-dot { animation: bounce3 1.25s ease-in-out infinite; }
    .t-dot:nth-child(2) { animation-delay: 0.16s; }
    .t-dot:nth-child(3) { animation-delay: 0.32s; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .msg-in { animation: msgIn 0.42s cubic-bezier(0.16,1,0.3,1) both; }

    /* AI label shimmer */
    @keyframes shimmer {
      0%   { background-position: -250% 0; }
      100% { background-position:  250% 0; }
    }
    .ai-label {
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #93c5fd, #60a5fa);
      background-size: 250% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4.5s linear infinite;
      font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
    }

    /* Orb float */
    .orb-float { animation: orbFloat 4.8s ease-in-out infinite, orbGlow 4.8s ease-in-out infinite; }

    /* Input */
    textarea {
      resize: none; outline: none; border: none; background: transparent;
      width: 100%; font-family: 'Inter', sans-serif; font-size: 14px;
      line-height: 1.65; color: rgba(255,255,255,0.9);
    }
    textarea::placeholder { color: rgba(255,255,255,0.22); }
    .input-wrap:focus-within {
      border-color: rgba(96,165,250,0.35) !important;
      box-shadow: 0 0 0 1px rgba(96,165,250,0.08), 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Chip / nav hover */
    .chip { transition: background 0.18s, border-color 0.18s, color 0.18s; }
    .chip:hover {
      background: rgba(96,165,250,0.1) !important;
      border-color: rgba(96,165,250,0.3) !important;
      color: rgba(255,255,255,0.9) !important;
    }
    .nav-chip { transition: all 0.18s; }
    .nav-chip:hover { background: rgba(255,255,255,0.05) !important; }
    .nav-chip.active {
      background: rgba(96,165,250,0.1) !important;
      border-color: rgba(96,165,250,0.25) !important;
    }

    /* Send button */
    .send-btn { transition: all 0.18s ease; }
    .send-btn.ready { box-shadow: 0 0 20px rgba(96,165,250,0.35); }
    .send-btn.ready:hover { background: rgba(96,165,250,1) !important; box-shadow: 0 0 28px rgba(96,165,250,0.55) !important; transform: scale(1.05); }

    /* Pre / code inside messages */
    .msg-body pre {
      background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 12px 14px; overflow-x: auto;
      font-size: 13px; line-height: 1.6; margin: 8px 0;
      font-family: 'Fira Mono', 'Consolas', monospace;
    }
    .msg-body code {
      background: rgba(0,0,0,0.3); border-radius: 4px;
      padding: 1px 5px; font-size: 12.5px;
      font-family: 'Fira Mono', 'Consolas', monospace;
      color: rgba(147,197,253,0.9);
    }
    .msg-body pre code { background: transparent; padding: 0; color: rgba(255,255,255,0.78); }
  </style>
</head>

          return res.json().then(function(data) {

            var reply = data.response || data.message || data.reply || data.content || data.text || data.answer || '';
