<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const { motion, AnimatePresence } = window.Motion || window.FramerMotion || {};

/* ─────────────────────────────────────────
   UTILITIES
───────────────────────────────────────── */

function renderMarkdown(text){
  try {
    if (window.marked && window.DOMPurify){
      window.marked.setOptions({ breaks:true, gfm:true });
      const raw = window.marked.parse(text || '');
      return window.DOMPurify.sanitize(raw);
    }
  } catch(e){}
  return (text||'').replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
}

function useTypewriter(text, enabled, speed=14){
  const [out,setOut] = useState(enabled?'':text);
  useEffect(()=>{
    if (!enabled){ setOut(text); return; }
    setOut('');
    let i=0;
    const step=Math.max(1,Math.ceil(text.length/200));
    const id=setInterval(()=>{
      i=Math.min(text.length,i+step);
      setOut(text.slice(0,i));
      if(i>=text.length) clearInterval(id);
    },speed);
    return ()=>clearInterval(id);
  },[text,enabled,speed]);
  return [out, out.length<(text||'').length];
}

/* ─────────────────────────────────────────
   ANIMATED BACKGROUND
───────────────────────────────────────── */

function AnimatedBackground(){
  const particles = useMemo(()=>{
    const arr=[];
    for(let i=0;i<36;i++){
      arr.push({id:i,left:Math.random()*100,top:Math.random()*100,
        size:2+Math.random()*4,delay:Math.random()*6,dur:8+Math.random()*10,o:.25+Math.random()*.5});
    }
    return arr;
  },[]);

  return (
    <div className="fixed inset-0 overflow-hidden pointer-events-none">
      <video autoPlay muted loop playsInline
        className="absolute inset-0 w-full h-full object-cover opacity-50"
        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
      />
      <div className="absolute inset-0" style={Object.assign({},{background:'linear-gradient(180deg,rgba(4,5,10,0.7),rgba(4,5,10,0.88))'})}/>
      <div className="absolute -top-40 -left-40 w-[600px] h-[600px] rounded-full"
           style={Object.assign({},{background:'radial-gradient(circle,rgba(90,169,255,0.18),transparent 60%)',filter:'blur(20px)'})}/>
      <div className="absolute -bottom-60 right-0 w-[700px] h-[700px] rounded-full"
           style={Object.assign({},{background:'radial-gradient(circle,rgba(120,90,255,0.12),transparent 60%)',filter:'blur(30px)'})}/>
      <div className="absolute inset-0 grid-bg"/>
      <div className="absolute inset-0 noise"/>
      {particles.map(p=>(
        <motion.div key={p.id} className="particle"
          style={Object.assign({},{left:p.left+'%',top:p.top+'%',width:p.size+'px',height:p.size+'px',opacity:p.o})}
          animate={{ y:[0,-30,0], opacity:[p.o,p.o*0.3,p.o] }}
          transition={{ duration:p.dur, delay:p.delay, repeat:Infinity, ease:'easeInOut' }}
        />
      ))}
      <div className="absolute inset-0 vignette"/>
    </div>
  );
}

/* ─────────────────────────────────────────
   SHARED UI PRIMITIVES
───────────────────────────────────────── */

function GlassCard({children,className,bright,bordered,style}){
  const cls=`glass rounded-2xl ${bright?'glass-bright':''} ${bordered?'ai-border':''} ${className||''}`;
  return <div className={cls} style={style}>{children}</div>;
}

function Orb({size=80}){
  return (
    <div className="relative" style={Object.assign({},{width:size,height:size})}>
      <div className="absolute inset-0 rounded-full glow-dot" style={Object.assign({},{transform:'scale(1.8)',opacity:.55})}/>
      <motion.div className="absolute inset-0 rounded-full orb"
        animate={{ scale:[1,1.05,1] }} transition={{ duration:4,repeat:Infinity,ease:'easeInOut'}}/>
      <div className="absolute inset-[-6px] rounded-full conic-ring"/>
      <motion.div className="absolute inset-[-14px] rounded-full border border-white/10"
        animate={{ rotate:360 }} transition={{ duration:24,repeat:Infinity,ease:'linear'}}
        style={Object.assign({},{borderTopColor:'rgba(120,180,255,0.55)'})}/>
      <motion.div className="absolute inset-[-24px] rounded-full border border-white/5"
        animate={{ rotate:-360 }} transition={{ duration:40,repeat:Infinity,ease:'linear'}}
        style={Object.assign({},{borderLeftColor:'rgba(170,120,255,0.4)'})}/>

/* ─────────────────────────────────────────

───────────────────────────────────────── */

/* ── Spinner icon ── */

/* ── Error row ── */
function AuthError({msg}){
  if(!msg) return null;
  return (
    <motion.div initial={{opacity:0,y:4}} animate={{opacity:1,y:0}}
      className="flex items-center gap-1.5 text-[12px] text-rose-300 pt-0.5">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {msg}
    </motion.div>
  );
}

/* ── Auth Input ── */
function AuthInput({type='text',placeholder,value,onChange,icon,onEnter,autoFocus,maxLength,inputMode,pattern,extraClass}){
  return (
    <div className="relative">
      {icon && (
        <div className="absolute left-3.5 top-1/2 pointer-events-none"
             style={Object.assign({},{transform:'translateY(-50%)',color:'rgba(125,134,153,0.75)'})}>
          {icon}
        </div>
      )}
      <input
        type={type}
        placeholder={placeholder}
        value={value}
        onChange={e=>onChange(e.target.value)}
        onKeyDown={e=>e.key==='Enter' && onEnter && onEnter()}
        autoFocus={autoFocus||false}
        maxLength={maxLength}
        inputMode={inputMode}
        pattern={pattern}
        className={`auth-input ${icon?'pl-10':'pl-4'} ${extraClass||''}`}
      />
    </div>
  );
}

/* ── AuthCard (Login / Signup / OTP) ── */
function AuthCard(){
  const [view,setView]     = useState('login');
  const [email,setEmail]   = useState('');
  const [pass,setPass]     = useState('');
  const [otp,setOtp]       = useState('');
  const [userId,setUserId] = useState(null);
  const [loading,setLoading]= useState(false);
  const [error,setError]   = useState('');

  const switchView = v => { setView(v); setError(''); };

  /* ── Login ── */
  const handleLogin = async () => {
    if(!email||!pass){ setError('Please fill in all fields'); return; }
    setLoading(true); setError('');
    try {
      const fd=new FormData(); fd.append('email',email); fd.append('password',pass);
      const res=await fetch('/login',{method:'POST',body:fd});
      const data=await res.json();
      if(data.message==='Login successful'){ window.location.href='/'; return; }
      setError(data.message||'Invalid credentials');
    } catch(e){ setError('Network error. Please try again.'); }
    setLoading(false);
  };

  /* ── Signup ── */
  const handleSignup = async () => {
    if(!email||!pass){ setError('Please fill in all fields'); return; }
    setLoading(true); setError('');
    try {

/* ─────────────────────────────────────────
   PDF UPLOADER
───────────────────────────────────────── */

function PdfUploader({sessionId,pdfs,onUploaded}){
  const inputRef=useRef(null);
  const [files,setFiles]=useState([]);
  const [status,setStatus]=useState('idle');
  const [progress,setProgress]=useState(0);
  const [errorMsg,setErrorMsg]=useState('');

  const pick=()=>inputRef.current?.click();

  const onChange=(e)=>{
    const list=Array.from(e.target.files||[]).filter(f=>/\.pdf$/i.test(f.name));
    setFiles(list); setStatus('idle'); setErrorMsg('');
  };

  const upload=()=>{
    if(!files.length||!sessionId) return;
    const fd=new FormData();
    files.forEach(f=>fd.append('pdfs',f,f.name));
    fd.append('session_id',String(sessionId));
    const xhr=new XMLHttpRequest();
    xhr.open('POST','/upload_pdf');
    xhr.upload.onprogress=(ev)=>{
      if(ev.lengthComputable) setProgress(Math.round((ev.loaded/ev.total)*100));
    };
    xhr.onload=()=>{
      if(xhr.status>=200&&xhr.status<300){
        setStatus('success'); setProgress(100);
        const names=files.map(f=>f.name);
        onUploaded&&onUploaded(names);
        setFiles([]);
        if(inputRef.current) inputRef.current.value='';
        setTimeout(()=>setStatus(s=>s==='success'?'idle':s),2800);
      } else { setStatus('error'); setErrorMsg(`Upload failed (${xhr.status})`); }
    };
    xhr.onerror=()=>{ setStatus('error'); setErrorMsg('Network error'); };
    setStatus('uploading'); setProgress(0);
    xhr.send(fd);
  };

  const uploading=status==='uploading';

  return (
    <GlassCard bordered className="p-4">
      <div className="flex items-center justify-between mb-3">
        <div className="mono text-[10px] tracking-[0.25em] text-white/40">UPLOAD PDFs</div>
        <div className="mono text-[10px] text-white/30">{files.length||''}</div>
      </div>

      <input ref={inputRef} type="file" name="pdfs" accept=".pdf" multiple onChange={onChange} className="hidden"/>

      <div className="flex items-center gap-2">
        <button type="button" onClick={pick} disabled={uploading||!sessionId}
          className="chip rounded-xl px-3 py-2 text-[12px] text-white/80 flex items-center gap-2 disabled:opacity-40 flex-1">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
            <path d="M21.44 11.05l-9.19 9.19a5.5 5.5 0 01-7.78-7.78l9.19-9.19a3.5 3.5 0 014.95 4.95L9.41 17.41a1.5 1.5 0 11-2.12-2.12L15.5 7.07"/>
          </svg>
          <span className="truncate">{files.length?`${files.length} file${files.length>1?'s':''} selected`:'Choose PDFs'}</span>
        </button>
        <motion.button whileTap={{scale:.95}} type="button" onClick={upload}
          disabled={!files.length||uploading||!sessionId}
          className="glass-bright rounded-xl px-3 py-2 text-[12px] text-white font-medium disabled:opacity-40 flex items-center gap-1.5">
          {uploading ? (
            <><svg className="animate-spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg><span>{progress}%</span></>
          ) : (
            <><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg><span>Upload</span></>
          )}
        </motion.button>
      </div>

      {!!files.length&&!uploading&&(
        <div className="mt-3 space-y-1">
          {files.slice(0,4).map((f,i)=>(
            <div key={i} className="text-[11px] text-white/55 truncate flex items-center gap-1.5">
              <span className="w-1 h-1 rounded-full bg-sky-400/70 shrink-0"/>
              <span className="truncate">{f.name}</span>
            </div>
          ))}
          {files.length>4&&<div className="text-[11px] text-white/35">+{files.length-4} more</div>}
        </div>
      )}

      {uploading&&(
        <div className="mt-3">
          <div className="h-1 rounded-full bg-white/5 overflow-hidden">
            <motion.div className="h-full" style={Object.assign({},{background:'linear-gradient(90deg,#5aa9ff,#9fc4ff)'})}
              initial={{width:0}} animate={{width:progress+'%'}} transition={{duration:.25}}/>
          </div>
          <div className="mono text-[10px] text-white/40 mt-1.5">Processing PDFs…</div>
        </div>
      )}

      <AnimatePresence>
        {status==='success'&&(
          <motion.div initial={{opacity:0,y:4}} animate={{opacity:1,y:0}} exit={{opacity:0}}
            className="mt-3 text-[11px] text-emerald-300 flex items-center gap-1.5">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>
            Uploaded successfully
          </motion.div>
        )}
        {status==='error'&&(
          <motion.div initial={{opacity:0,y:4}} animate={{opacity:1,y:0}} exit={{opacity:0}}
            className="mt-3 text-[11px] text-rose-300">{errorMsg||'Something went wrong'}</motion.div>
        )}
        {!sessionId&&(
          <motion.div initial={{opacity:0}} animate={{opacity:1}}
            className="mt-3 text-[11px] text-white/35">Waiting for session…</motion.div>
        )}
      </AnimatePresence>

      {/* Uploaded PDFs */}
      <div className="mt-4 pt-3 border-t border-white/5">
        <div className="flex items-center justify-between mb-2">
          <div className="mono text-[10px] tracking-[0.25em] text-white/40">UPLOADED PDFs</div>
          <div className="mono text-[10px] text-white/30">{(pdfs||[]).length}</div>
        </div>
        {(!pdfs||pdfs.length===0) ? (
          <div className="text-[11px] text-white/35 px-1 py-1">No PDFs in this session</div>
        ) : (
          <div className="flex flex-col gap-1 max-h-40 overflow-y-auto nova-scroll pr-1">
            {pdfs.map((name,i)=>(
              <div key={i} className="flex items-center gap-2 px-2 py-1.5 rounded-lg bg-white/[0.02] border border-white/5">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className="text-sky-300/80 shrink-0">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/>
                </svg>
                <span className="text-[11.5px] text-white/75 truncate" title={name}>{name}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </GlassCard>
  );
}

/* ─────────────────────────────────────────
   SESSION ITEM  (with inline rename)
───────────────────────────────────────── */

function SessionItem({session,isActive,onSelect}){
  const [editing,setEditing]=useState(false);
  const [title,setTitle]=useState(session.title||'New Chat');
  const editRef=useRef(null);

  useEffect(()=>{ setTitle(session.title||'New Chat'); },[session.title]);

  const startEdit=(e)=>{ e.stopPropagation(); setEditing(true); setTimeout(()=>editRef.current?.select(),30); };

  const saveRename=async()=>{
    const next=title.trim()||'New Chat';
    setTitle(next); setEditing(false);
    if(next===(session.title||'New Chat')) return;
    try {
      const fd=new FormData();
      fd.append('session_id',String(session.id));
      fd.append('title',next);
      await fetch('/rename_session',{method:'POST',body:fd});
    } catch(e){ console.error('Rename failed',e); }
  };

  const onKeyDown=(e)=>{
    if(e.key==='Enter'){ e.preventDefault(); saveRename(); }
    if(e.key==='Escape'){ setTitle(session.title||'New Chat'); setEditing(false); }
  };

  return (
    <motion.div
      whileHover={{x:editing?0:2}} transition={{duration:.15}}
      onClick={()=>!editing&&onSelect(session.id)}
      className={`session-item rounded-xl px-3 py-2.5 flex items-center gap-2.5 group cursor-pointer ${isActive?'active':''}`}
    >
      {/* Chat icon */}
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"
           style={Object.assign({},{color:isActive?'#7dd3fc':'rgba(255,255,255,0.4)',flexShrink:0})}>
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>

      {/* Title or edit input */}
      {editing ? (
        <input
          ref={editRef}
          value={title}
          onChange={e=>setTitle(e.target.value)}
          onBlur={saveRename}
          onKeyDown={onKeyDown}
          onClick={e=>e.stopPropagation()}
          className="flex-1 min-w-0 text-[13px] text-white bg-transparent outline-none"
          style={Object.assign({},{fontFamily:"'Inter',sans-serif",borderBottom:'1px solid rgba(90,169,255,0.5)',paddingBottom:'1px'})}
        />
      ) : (
        <span className={`flex-1 min-w-0 truncate text-[13px] ${isActive?'text-white':'text-white/70 group-hover:text-white/90'}`}>
          {title}
        </span>
      )}

      {/* Edit / rename button */}
      {!editing && (
        <button
          onClick={startEdit}
          className="opacity-0 group-hover:opacity-50 hover:!opacity-100 shrink-0 rounded p-0.5 transition-all duration-150"
          style={Object.assign({},{color:'rgba(255,255,255,0.5)'})}
          title="Rename session"
          onMouseEnter={e=>{e.currentTarget.style.color='rgba(90,169,255,0.95)';}}
          onMouseLeave={e=>{e.currentTarget.style.color='rgba(255,255,255,0.5)';}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      )}

      {/* Active dot */}
      {isActive&&!editing&&(
        <span className="w-1.5 h-1.5 rounded-full bg-sky-400 shrink-0"
              style={Object.assign({},{boxShadow:'0 0 8px #5aa9ff'})}/>
      )}
    </motion.div>
  );
}

/* ─────────────────────────────────────────
   CHAT SESSIONS LIST
───────────────────────────────────────── */

const VISIBLE_SESSIONS=4;
function ChatSessionsList({sessions,activeSessionId,onSelectSession}){
  const [expanded,setExpanded]=useState(false);

  const sorted=useMemo(()=>{
    const list=Array.isArray(sessions)?sessions.slice():[];
    list.sort((a,b)=>{
      const ta=a.updated_at||a.last_active||a.created_at||a.id;
      const tb=b.updated_at||b.last_active||b.created_at||b.id;
      const na=typeof ta==='string'?Date.parse(ta)||0:Number(ta)||0;
      const nb=typeof tb==='string'?Date.parse(tb)||0:Number(tb)||0;
      return nb-na;
    });
    return list;
  },[sessions]);

  const hasMore=sorted.length>VISIBLE_SESSIONS;
  const visible=(!hasMore||expanded)?sorted:sorted.slice(0,VISIBLE_SESSIONS);

  return (
    <div>
      <div className="flex items-center justify-between mb-3 px-1">
        <div className="mono text-[10px] tracking-[0.25em] text-white/40">CHAT SESSIONS</div>
        <div className="mono text-[10px] text-white/30">{sorted.length}</div>
      </div>
      <div className="flex flex-col gap-1.5">
        {sorted.length===0&&(
          <div className="text-[12px] text-white/40 px-3 py-4 text-center">No sessions yet</div>
        )}
        {visible.map(s=>(
          <SessionItem
            key={s.id}
            session={s}
            isActive={String(s.id)===String(activeSessionId)}
            onSelect={onSelectSession}
          />
        ))}
        {hasMore&&(
          <button onClick={()=>setExpanded(v=>!v)}
            className="mt-1 rounded-xl px-3 py-2 text-[12px] text-sky-300/90 hover:text-sky-200 hover:bg-white/5 text-center transition-colors">
            {expanded?'Show Less':`View All Chats (${sorted.length})`}
          </button>
        )}
      </div>
    </div>
  );
}

function Message({msg,index,isLatestAssistant}){
  const isUser=msg.role==='user';
  const [copied,setCopied]=useState(false);
  const [text,typing]=useTypewriter(msg.content||'',!isUser&&isLatestAssistant,12);

  const copy=()=>{
    try { navigator.clipboard.writeText(msg.content||''); setCopied(true); setTimeout(()=>setCopied(false),1400); } catch(e){}
  };

  const time=useMemo(()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false}),[]);

  return (
    <motion.div
      initial={{opacity:0,y:14,filter:'blur(8px)'}}
      animate={{opacity:1,y:0,filter:'blur(0px)'}}
      transition={{duration:.55,ease:'easeOut',delay:Math.min(index*0.04,0.4)}}
      className={`group w-full flex ${isUser?'justify-end':'justify-start'}`}
    >
      <div className={`max-w-[92%] sm:max-w-[85%] md:max-w-[80%] ${isUser?'':'flex gap-2 sm:gap-3 items-start'}`}>
        {!isUser&&(
          <div className="mt-1 shrink-0"><Orb size={28}/></div>
        )}
        <div className="flex-1 min-w-0">
          {!isUser?(
            <div className="flex items-center gap-2 mb-1.5">
              <span className="mono text-[10px] tracking-[0.3em] text-sky-300/70">ASSISTANT</span>
              <span className="mono text-[10px] text-white/25">·</span>
              <span className="mono text-[10px] text-white/30">{time}</span>
            </div>
          ):null}
          <GlassCard bright={isUser} bordered={!isUser}
            className={`lift px-4 py-3 ${isUser?'rounded-2xl rounded-br-sm':'rounded-2xl rounded-tl-sm'}`}>
            {isUser ? (
              <div className="text-[14.5px] leading-relaxed whitespace-pre-wrap text-white">{msg.content}</div>
            ) : (
              <div className="md-body" dangerouslySetInnerHTML={{__html:renderMarkdown(text)+(typing?'<span class="caret"></span>':'')}}/>
            )}
          </GlassCard>
          <div className={`flex items-center gap-2 mt-1.5 ${isUser?'justify-end':'justify-start pl-1'}`}>
            {isUser?(
              <span className="mono text-[10px] tracking-[0.25em] text-white/30">YOU · {time}</span>
            ):(
              <button onClick={copy}
                className="opacity-0 group-hover:opacity-100 transition-opacity mono text-[10px] tracking-[0.2em] text-white/40 hover:text-sky-300 flex items-center gap-1.5">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                {copied?'COPIED':'COPY'}
              </button>
            )}
          </div>
        </div>
      </div>
    </motion.div>
  );
}

/* ─────────────────────────────────────────
   TYPING INDICATOR
───────────────────────────────────────── */

function Typing(){
  const phrases=['composing response','retrieving context','synthesizing tokens','reasoning'];
  const [i,setI]=useState(0);
  useEffect(()=>{ const t=setInterval(()=>setI(x=>(x+1)%phrases.length),1500); return ()=>clearInterval(t); },[]);
  return (
    <motion.div initial={{opacity:0,y:10}} animate={{opacity:1,y:0}} exit={{opacity:0}} className="flex items-start gap-3">
      <Orb size={28}/>
      <div>
        <div className="mono text-[10px] tracking-[0.3em] text-sky-300/70 mb-1.5">THINKING</div>
        <GlassCard bordered className="px-4 py-3 rounded-2xl rounded-tl-sm">
          <div className="flex items-center gap-1.5">
            {[0,1,2].map(k=>(
              <motion.span key={k} className="typing-dot"
                animate={{y:[0,-4,0],opacity:[.4,1,.4]}}
                transition={{duration:1,repeat:Infinity,delay:k*0.15}}/>
            ))}
            <AnimatePresence mode="wait">
              <motion.span key={phrases[i]} initial={{opacity:0,y:4}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-4}}
                transition={{duration:.3}} className="ml-2 mono text-[10px] text-white/40">{phrases[i]}</motion.span>
            </AnimatePresence>
          </div>
        </GlassCard>
      </div>
    </motion.div>
  );
}

/* ─────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────── */

function EmptyState({onSuggest,pdfCount}){
  const examples=[
    'Summarize this document',
    'What are the key findings?',
    'Explain this topic in simple terms',
    'Compare information across documents',
    'Extract important facts',
    'Find references to a specific topic',
  ];
  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} transition={{duration:1}}
      className="h-full flex flex-col items-center justify-center text-center px-6 sm:px-8 py-10">
      <motion.div initial={{scale:.8,opacity:0}} animate={{scale:1,opacity:1}}
        transition={{duration:1.2,ease:'easeOut'}} className="float-y">
        <Orb size={typeof window!=='undefined'&&window.innerWidth<480?72:96}/>
      </motion.div>
      <motion.h1 initial={{opacity:0,y:14,filter:'blur(10px)'}} animate={{opacity:1,y:0,filter:'blur(0px)'}}
        transition={{duration:1,delay:.2}} className="nova-title serif mt-6 sm:mt-8 leading-[1.05]"
        style={Object.assign({},{fontSize:'clamp(2.1rem,6vw,4rem)'})}>
        AskPDF
      </motion.h1>
      <motion.p initial={{opacity:0,y:10}} animate={{opacity:1,y:0}}
        transition={{duration:1,delay:.35}} className="text-white/65 mt-4 max-w-xl text-[15px] leading-relaxed">
        📄 Upload one or more PDF documents and start asking questions.
      </motion.p>
      <motion.div initial={{opacity:0,y:14}} animate={{opacity:1,y:0}}
        transition={{duration:1,delay:.55}} className="mt-8 w-full max-w-2xl">
        <div className="mono text-[10px] tracking-[0.3em] text-white/40 mb-3">EXAMPLE QUESTIONS</div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
          {examples.map((q,i)=>(
            <motion.button key={i} onClick={()=>onSuggest(q)} whileHover={{y:-2}} transition={{duration:.2}}
              className="chip rounded-xl px-4 py-3 text-left text-[13.5px] text-white/85 hover:text-white">
              • {q}
            </motion.button>
          ))}
        </div>
      </motion.div>
      <motion.div initial={{opacity:0}} animate={{opacity:1}} transition={{duration:1,delay:.75}}
        className="mt-8 text-[12.5px] text-white/55">
        {pdfCount>0?`${pdfCount} document${pdfCount===1?'':'s'} ready for analysis.`:'No documents uploaded yet.'}
      </motion.div>
    </motion.div>
  );
}

/* ─────────────────────────────────────────
   INPUT BAR
───────────────────────────────────────── */

function InputBar({value,setValue,onSend,disabled,inputRef}){
  const localRef=useRef(null);
  const ref=inputRef||localRef;

  useEffect(()=>{
    const el=ref.current; if(!el) return;
    el.style.height='auto';
    el.style.height=Math.min(el.scrollHeight,220)+'px';
  },[value]);

  const handleKey=(e)=>{
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(value.trim()&&!disabled) onSend(); }
  };

  return (
    <motion.div initial={{opacity:0,y:30,filter:'blur(10px)'}} animate={{opacity:1,y:0,filter:'blur(0px)'}}
      transition={{duration:.8,delay:.3,ease:'easeOut'}} className="w-full px-3 sm:px-4 pb-5 pt-2">
      <GlassCard bordered className="rounded-3xl p-3 pl-4 sm:pl-5 ring-soft">
        <div className="flex items-end gap-3">
          <div className="hidden sm:flex items-center gap-2 pb-2.5 text-white/40">
            <motion.span className="w-2 h-2 rounded-full bg-sky-400"
              style={Object.assign({},{boxShadow:'0 0 10px #5aa9ff'})}
              animate={{opacity:[1,.4,1]}} transition={{duration:2,repeat:Infinity}}/>
            <span className="mono text-[10px] tracking-[0.3em]">PROMPT</span>
          </div>
          <textarea ref={ref} value={value} onChange={e=>setValue(e.target.value)} onKeyDown={handleKey}
            placeholder="Ask a question about your documents..." rows={1} className="nova-input flex-1 py-2.5" autoFocus/>
          <div className="flex items-center gap-2">
            <motion.button whileTap={{scale:.94}} whileHover={{scale:1.04}} disabled={!value.trim()||disabled} onClick={onSend}
              className="relative h-10 px-4 rounded-2xl glass-bright text-white text-sm font-medium flex items-center gap-2 disabled:opacity-40">
              <span>Send</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M5 12h14M13 5l7 7-7 7"/>
              </svg>
            </motion.button>
          </div>
        </div>
      </GlassCard>
    </motion.div>
  );
}

/* ─────────────────────────────────────────
   SESSION STORAGE HELPERS
───────────────────────────────────────── */

const SESSION_KEY='nova_session_id';
const getStoredSessionId=()=>{ try{ return localStorage.getItem(SESSION_KEY); }catch(e){ return null; } };
const setStoredSessionId=(id)=>{ try{ localStorage.setItem(SESSION_KEY,String(id)); }catch(e){} };

/* ─────────────────────────────────────────
   CHAT APP  (the full chatbot UI)
───────────────────────────────────────── */

function ChatApp(){
  const initialHistory  = Array.isArray(window.__CHAT_HISTORY__)?window.__CHAT_HISTORY__:[];
  const initialSessions = Array.isArray(window.__SESSIONS__)    ?window.__SESSIONS__    :[];
  const initialPdfs     = Array.isArray(window.__SESSION_PDFS__)?window.__SESSION_PDFS__:[];

  const [history,   setHistory]   = useState(initialHistory);
  const [sessions,  setSessions]  = useState(initialSessions);
  const [sessionId, setSessionId] = useState(null);
  const [input,     setInput]     = useState('');
  const [pending,   setPending]   = useState(false);
  const [mobileOpen,setMobileOpen]= useState(false);
  const [atBottom,  setAtBottom]  = useState(true);
  const [pdfsBySession,setPdfsBySession] = useState({});

  const scrollRef=useRef(null);
  const inputRef =useRef(null);

  /* ── Bootstrap session ── */
  useEffect(()=>{
    let stored=getStoredSessionId();
    if(stored){
      setSessionId(stored);
      const field=document.getElementById('nova-session-id');
      if(field) field.value=stored;
      return;
    }
    fetch('/create_new_session')
      .then(r=>r.json())
      .then(data=>{
        const newId=data.session_id;
        setStoredSessionId(newId); setSessionId(newId);
        const field=document.getElementById('nova-session-id');
        if(field) field.value=newId;
        return refreshSessions();
      })
      .catch(err=>console.error('Failed to create session',err));
  },[]);

  /* ── Seed initial PDFs ── */
  useEffect(()=>{
    if(sessionId!=null&&initialPdfs.length&&!pdfsBySession[sessionId]){
      setPdfsBySession(prev=>({...prev,[sessionId]:initialPdfs}));
    }
  },[sessionId]);

  const currentPdfs=sessionId!=null?(pdfsBySession[sessionId]||[]):[];

  const handlePdfsUploaded=useCallback((names)=>{
    if(sessionId==null) return;
    setPdfsBySession(prev=>{
      const existing=prev[sessionId]||[];
      return {...prev,[sessionId]:existing.concat(names)};
    });
  },[sessionId]);

  /* ── Sync hidden form field ── */
  useEffect(()=>{
    const field=document.getElementById('nova-session-id');
    if(field&&sessionId!=null) field.value=sessionId;
  },[sessionId]);

  /* ── Refresh sessions list ── */
  const refreshSessions=useCallback(async()=>{
    try {
      const res=await fetch('/',{headers:{'Accept':'text/html'}});
      const html=await res.text();
      const match=html.match(/window\.__SESSIONS__\s*=\s*(\[[\s\S]*?\]);/);
      if(match){
        try{ const list=JSON.parse(match[1]); if(Array.isArray(list)) setSessions(list); }catch(e){}
      }
    }catch(e){ console.warn('Could not refresh sessions',e); }
  },[]);

  /* ── Load a session ── */
  const loadSession=useCallback(async(id)=>{
    try {
      const res=await fetch(`/load_session/${id}`);
      const data=await res.json();
      setHistory(Array.isArray(data.history)?data.history:[]);
      setPdfsBySession(prev=>({...prev,[id]:data.pdfs||[]}));
    }catch(e){
      console.error('Failed to load session',e);
      setHistory([]);
      setPdfsBySession(prev=>({...prev,[id]:[]}));
    }
  },[]);

  /* ── Select a session ── */
  const selectSession=useCallback((id)=>{
    if(String(id)===String(sessionId)){ setMobileOpen(false); return; }
    setStoredSessionId(id); setSessionId(id);
    loadSession(id); setMobileOpen(false);
  },[sessionId,loadSession]);

  /* ── New Chat ── */
  const newChat=useCallback(async()=>{
    try {
      const res=await fetch('/create_new_session');
      const data=await res.json();
      const newId=data.session_id;
      setStoredSessionId(newId); setSessionId(newId);
      setHistory([]); setInput(''); setMobileOpen(false);
      await refreshSessions();
    }catch(e){ console.error('Failed to create new session',e); }
  },[refreshSessions]);

  /* ── Last assistant index for typewriter ── */
  const lastAssistantIdx=useMemo(()=>{
    for(let i=history.length-1;i>=0;i--) if(history[i].role!=='user') return i;
    return -1;
  },[history]);

  /* ── Auto-scroll on new messages ── */
  useEffect(()=>{
    const el=scrollRef.current; if(!el) return;
    el.scrollTo({top:el.scrollHeight,behavior:'smooth'});
  },[history.length,pending]);

  useEffect(()=>{
    const el=scrollRef.current; if(!el) return;
    const onScroll=()=>{ const dist=el.scrollHeight-el.scrollTop-el.clientHeight; setAtBottom(dist<80); };
    el.addEventListener('scroll',onScroll,{passive:true});
    return ()=>el.removeEventListener('scroll',onScroll);
  },[]);

  /* ── Keyboard shortcuts ── */
  useEffect(()=>{
    const onKey=(e)=>{
      if(e.key==='/'&&document.activeElement?.tagName!=='TEXTAREA'&&document.activeElement?.tagName!=='INPUT'){
        e.preventDefault(); inputRef.current?.focus();
      } else if(e.key==='Escape'){
        setInput('');
      } else if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){
        e.preventDefault(); setMobileOpen(v=>!v);
      }
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  /* ── Send message ── */
  const send=()=>{
    const text=input.trim(); if(!text) return;
    if(!sessionId){ console.warn('No active session yet.'); return; }
    setHistory(history.concat([{role:'user',content:text}]));
    setInput(''); setPending(true);
    const form   =document.getElementById('nova-form');
    const qField =document.getElementById('nova-query');
    const sField =document.getElementById('nova-session-id');
    qField.value =text; sField.value=sessionId;
    form.submit();
  };

  const scrollDown=()=>{ const el=scrollRef.current; if(!el) return; el.scrollTo({top:el.scrollHeight,behavior:'smooth'}); };

  return (
    <div className="app-shell relative w-full flex overflow-hidden">
      <AnimatedBackground/>
      <div className="relative z-10 flex w-full h-full">
        <Sidebar
          mobileOpen={mobileOpen}
          onClose={()=>setMobileOpen(false)}
          sessions={sessions}
          activeSessionId={sessionId}
          onSelectSession={selectSession}
          onNewChat={newChat}
          pdfs={currentPdfs}
          onPdfsUploaded={handlePdfsUploaded}
        />

        {/* ── Main ── */}
        <main className="flex-1 flex flex-col min-w-0 h-full p-2 sm:p-4 lg:p-6 lg:pl-0 2xl:p-8 2xl:pl-0">
          <GlassCard bordered className="flex-1 flex flex-col min-h-0 rounded-2xl sm:rounded-3xl overflow-hidden relative">

            {/* Top bar */}
            <div className="flex items-center justify-between px-4 sm:px-6 py-4 border-b border-white/5">
              <div className="flex items-center gap-3">
                <button onClick={()=>setMobileOpen(true)}
                  className="lg:hidden w-9 h-9 rounded-xl chip flex items-center justify-center text-white/70" aria-label="Open menu">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                </button>
                <div>
                  <div className="text-sm text-white/90 flex items-center gap-2">
                    <span>📄</span>
                    <span>{currentPdfs.length} {currentPdfs.length===1?'Document':'Documents'} Loaded</span>
                  </div>
                  <div className="text-[11px] text-white/45 mt-0.5">Ask questions about your PDFs</div>
                </div>
              </div>
            </div>

            {/* Chat area */}
            <div ref={scrollRef} className="flex-1 min-h-0 overflow-y-auto nova-scroll">
              {history.length===0&&!pending ? (
                <EmptyState pdfCount={currentPdfs.length} onSuggest={s=>{ setInput(s); setTimeout(()=>inputRef.current?.focus(),10); }}/>
              ) : (
                <div className="nova-chat-wrap px-3 sm:px-6 lg:px-10 py-5 sm:py-8 space-y-5 max-w-4xl 2xl:max-w-5xl mx-auto">
                  <AnimatePresence initial={false}>
                    {history.map((m,i)=>(
                      <Message key={i} msg={m} index={i} isLatestAssistant={i===lastAssistantIdx}/>
                    ))}
                    {pending&&<Typing key="typing"/>}
                  </AnimatePresence>
                </div>
              )}
            </div>

            {/* Scroll to bottom */}
            <AnimatePresence>
              {!atBottom&&(
                <motion.button initial={{opacity:0,y:10}} animate={{opacity:1,y:0}} exit={{opacity:0,y:10}}
                  onClick={scrollDown}
                  className="absolute bottom-24 sm:bottom-28 right-4 sm:right-6 z-20 w-10 h-10 rounded-full glass-bright flex items-center justify-center text-white shadow-lg"
                  aria-label="Scroll to bottom">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12l7 7-7 7"/></svg>
                </motion.button>
              )}
            </AnimatePresence>

            {/* Input */}
            <div className="border-t border-white/5">
              <div className="max-w-4xl 2xl:max-w-5xl mx-auto w-full">
                <InputBar value={input} setValue={setInput} onSend={send} disabled={pending} inputRef={inputRef}/>
              </div>
            </div>

          </GlassCard>
        </main>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   AUTH APP  (centered auth card)
───────────────────────────────────────── */

function AuthApp(){
  return (
    <div className="app-shell relative w-full overflow-hidden">
      <AnimatedBackground/>
      <div className="relative z-10 auth-scroll w-full min-h-screen flex items-center justify-center px-4 py-10">
        <AuthCard/>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   ROOT APP  (router)
───────────────────────────────────────── */

function App(){
  return window.__IS_CHAT__ ? <ChatApp/> : <AuthApp/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
