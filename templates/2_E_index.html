<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aeon Intelligence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --serif: 'Instrument Serif', Georgia, serif;
      --body: 'Barlow', system-ui, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #020205;
      color: rgba(255,255,255,0.90);
      font-family: var(--body);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    #root { width: 100%; height: 100%; }

    /* ── Keyframe animations ───────────────────── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes heroReveal {
      from { opacity: 0; transform: translateY(36px); filter: blur(12px); }
      to   { opacity: 1; transform: translateY(0);   filter: blur(0px);  }
    }
    @keyframes msgReveal {
      from { opacity: 0; transform: translateY(14px); filter: blur(5px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0px); }
    }
    @keyframes chipReveal {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes orbPulse {
      0%,100% { box-shadow: 0 0 40px rgba(100,130,255,0.08), 0 0 80px rgba(100,130,255,0.03); }
      50%      { box-shadow: 0 0 70px rgba(100,130,255,0.16), 0 0 140px rgba(100,130,255,0.07); }
    }
    @keyframes typingBounce {
      0%,80%,100% { transform: translateY(0);   opacity: 0.28; }
      40%          { transform: translateY(-5px); opacity: 1;   }
    }
    @keyframes barReveal {
      from { opacity: 0; transform: translateX(-50%) translateY(18px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes navReveal {
      from { opacity: 0; transform: translateX(-50%) translateY(-14px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Scrollbar ─────────────────────────────── */
    .aeon-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.10) transparent; }
    .aeon-scroll::-webkit-scrollbar { width: 2px; }
    .aeon-scroll::-webkit-scrollbar-track { background: transparent; }
    .aeon-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 999px; }

    /* ── Navbar ────────────────────────────────── */
    .aeon-nav {
      position: fixed; top: 14px;
      left: 50%; transform: translateX(-50%);
      width: calc(100% - 28px); max-width: 940px;
      background: rgba(255,255,255,0.038);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 8px 12px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
      animation: navReveal 0.75s cubic-bezier(0.16,1,0.3,1) 0.15s both;
    }

    .aeon-logo {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 17px;
      color: rgba(255,255,255,0.88);
      cursor: pointer; flex-shrink: 0;
      transition: background 0.18s;
    }
    .aeon-logo:hover { background: rgba(255,255,255,0.11); }

    .aeon-pill {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 999px; padding: 5px 18px;
      font-family: var(--body); font-size: 12px;
      font-weight: 500; letter-spacing: 0.10em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase; user-select: none;
    }

    .aeon-menu {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.18s;
    }
    .aeon-menu:hover { background: rgba(255,255,255,0.11); }
    .aeon-menu span {
      display: block; height: 1.5px;
      background: rgba(255,255,255,0.65); border-radius: 1px;
    }

    /* ── Chat scroll area ──────────────────────── */
    .aeon-chat-wrap {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      pointer-events: none;
    }
    .aeon-chat-scroll {
      flex: 1;
      padding: 76px 16px 130px;
      display: flex; flex-direction: column;
      pointer-events: auto;
    }
    .aeon-chat-inner {
      width: 100%; max-width: 820px;
      margin: 0 auto;
      display: flex; flex-direction: column;
      gap: 20px; flex: 1;
    }

    /* ── Message bubbles ───────────────────────── */
    .msg-row-ai   { display: flex; justify-content: flex-start; }
    .msg-row-user { display: flex; justify-content: flex-end; }

    .msg-col {
      display: flex; flex-direction: column;
      max-width: 78%;
      animation: msgReveal 0.48s cubic-bezier(0.16,1,0.3,1) both;
    }
    .msg-col-ai   { align-items: flex-start; }
    .msg-col-user { align-items: flex-end; }

    .msg-label {
      font-size: 10px; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.26);
      margin-bottom: 7px; font-weight: 500;
    }

    .msg-bubble {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 13px 18px;
      font-size: 14.5px; line-height: 1.68;
      color: rgba(255,255,255,0.86);
      font-weight: 300;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-bubble-ai {
      background: rgba(255,255,255,0.036);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px 18px 18px 18px;
      box-shadow: 0 0 28px rgba(100,130,255,0.05);
    }
    .msg-bubble-user {
      background: rgba(255,255,255,0.082);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 18px 4px 18px 18px;
    }

    /* ── Typing indicator ──────────────────────── */
    .typing-row { display: flex; justify-content: flex-start; }
    .typing-col { display: flex; flex-direction: column; align-items: flex-start; animation: msgReveal 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .typing-bubble {
      background: rgba(255,255,255,0.036);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 4px 16px 16px 16px;
      padding: 13px 18px;
      display: flex; align-items: center; gap: 5px;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.55);
      display: inline-block;
      animation: typingBounce 1.3s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    /* ── Empty state ───────────────────────────── */
    .aeon-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 90px 24px 180px; text-align: center;
      animation: heroReveal 1.0s cubic-bezier(0.16,1,0.3,1) both;
    }
    .aeon-orb {
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.11);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 44px;
      font-family: var(--serif); font-size: 34px;
      color: rgba(255,255,255,0.82);
      animation: orbPulse 5s ease-in-out infinite;
    }
    .aeon-headline {
      font-family: var(--serif);
      font-size: clamp(38px, 5.5vw, 68px);
      font-weight: 400; line-height: 1.1;
      letter-spacing: -0.025em;
      color: rgba(255,255,255,0.90);
      margin-bottom: 18px;
    }
    .aeon-sub {
      font-size: 15px; font-weight: 300;
      color: rgba(255,255,255,0.32);
      letter-spacing: 0.02em; line-height: 1.6;
      margin-bottom: 50px; max-width: 380px;
    }
    .aeon-chips {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; max-width: 560px;
    }
    .aeon-chip {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px; padding: 9px 20px;
      font-family: var(--body); font-size: 13px;
      font-weight: 400; color: rgba(255,255,255,0.45);
      cursor: pointer; letter-spacing: 0.01em;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      animation: chipReveal 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }
    .aeon-chip:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.16); color: rgba(255,255,255,0.72); }
    .chip-d1 { animation-delay: 0.65s; }
    .chip-d2 { animation-delay: 0.73s; }
    .chip-d3 { animation-delay: 0.81s; }
    .chip-d4 { animation-delay: 0.89s; }

    /* ── Input bar ─────────────────────────────── */
    .aeon-bar {
      position: fixed; bottom: 18px;
      left: 50%; transform: translateX(-50%);
      width: calc(100% - 28px); max-width: 820px;
      background: rgba(255,255,255,0.048);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 22px;
      padding: 11px 11px 11px 20px;
      display: flex; align-items: flex-end; gap: 10px;
      z-index: 100;
      animation: barReveal 0.75s cubic-bezier(0.16,1,0.3,1) 0.35s both;
    }
    .aeon-ta {
      flex: 1; background: transparent;
      border: none; outline: none; resize: none;
      color: rgba(255,255,255,0.88);
      font-family: var(--body); font-size: 15px;
      font-weight: 300; line-height: 1.6;
      min-height: 24px; max-height: 160px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.10) transparent;
    }
    .aeon-ta::placeholder { color: rgba(255,255,255,0.22); font-weight: 300; }

    .aeon-send {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; display: flex;
      align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.2s, transform 0.12s;
    }
    .aeon-send.on  { background: rgba(255,255,255,0.88); }
    .aeon-send.on:hover  { background: #fff; transform: scale(1.06); }
    .aeon-send.on:active { transform: scale(0.94); }
    .aeon-send.off { background: rgba(255,255,255,0.08); cursor: not-allowed; }

    /* ── Canvas bg ─────────────────────────────── */
    #aeon-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%; z-index: 0;
    }

    /* ── Overlays ──────────────────────────────── */
    .aeon-dark {
      position: fixed; inset: 0; z-index: 1;
      background: rgba(2,2,5,0.50); pointer-events: none;
    }
    .aeon-vignette {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 48%, rgba(2,2,5,0.60) 100%);
      pointer-events: none;
    }
    .aeon-grain {
      position: fixed; inset: 0; z-index: 3;
      pointer-events: none; opacity: 0.026;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 220px 220px;
    }
  </style>
</head>
<body>

<!-- Flask injects history -->
<script>
  try {
    window.CHAT_HISTORY = {{ history | tojson }};
  } catch(e) {
    window.CHAT_HISTORY = [];
  }
  if (!Array.isArray(window.CHAT_HISTORY)) window.CHAT_HISTORY = [];
</script>

<!-- Static bg layers -->
<canvas id="aeon-canvas"></canvas>
<div class="aeon-dark"></div>
<div class="aeon-vignette"></div>
<div class="aeon-grain"></div>

<!-- React root -->
<div id="root"></div>

<!-- Canvas starfield (runs immediately, no framework needed) -->
<script>
(function() {
  var canvas = document.getElementById('aeon-canvas');
  var ctx    = canvas.getContext('2d');
  var W, H, stars = [], raf;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 90; i++) {
    stars.push({
      x:  Math.random(),
      y:  Math.random(),
      r:  Math.random() * 1.1 + 0.15,
      vx: (Math.random() - 0.5) * 0.00007,
      vy: (Math.random() - 0.5) * 0.00007,
      a:  Math.random() * 0.45 + 0.08,
      ph: Math.random() * Math.PI * 2,
    });
  }

  var frame = 0;
  function draw() {
    frame++;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#020205';
    ctx.fillRect(0, 0, W, H);

    var g1 = ctx.createRadialGradient(W*0.18,H*0.28,0, W*0.18,H*0.28, W*0.38);
    g1.addColorStop(0,'rgba(55,75,190,0.052)'); g1.addColorStop(1,'transparent');
    ctx.fillStyle = g1; ctx.fillRect(0,0,W,H);

    var g2 = ctx.createRadialGradient(W*0.82,H*0.72,0, W*0.82,H*0.72, W*0.42);
    g2.addColorStop(0,'rgba(40,60,160,0.040)'); g2.addColorStop(1,'transparent');
    ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);

    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.x += s.vx; s.y += s.vy;
      if (s.x < 0) s.x = 1; if (s.x > 1) s.x = 0;
      if (s.y < 0) s.y = 1; if (s.y > 1) s.y = 0;
      var tw = Math.sin(frame * 0.018 + s.ph) * 0.28 + 0.72;
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(210,218,255,' + (s.a * tw) + ')';
      ctx.fill();
    }
    raf = requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<!-- React app -->
<script type="text/babel">
  var useState   = React.useState;
  var useEffect  = React.useEffect;
  var useRef     = React.useRef;
  var useCallback= React.useCallback;
  var CE         = React.createElement;

  /* ── Navbar ──────────────────────────────────── */
  function Navbar() {
    return CE('nav', { className: 'aeon-nav' },
      CE('div', { className: 'aeon-logo' }, 'a'),
      CE('div', { className: 'aeon-pill' }, 'Aeon Intelligence'),
      CE('div', { className: 'aeon-menu' },
        CE('span', { style: { width: '14px' } }),
        CE('span', { style: { width: '9px' } })
      )
    );
  }

  /* ── Typing dots ─────────────────────────────── */
  function TypingIndicator() {
    return CE('div', { className: 'typing-row' },
      CE('div', { className: 'typing-col' },
        CE('span', { className: 'msg-label' }, 'AEON'),
        CE('div', { className: 'typing-bubble' },
          CE('span', { className: 'dot' }),
          CE('span', { className: 'dot' }),
          CE('span', { className: 'dot' })
        )
      )
    );
  }

  /* ── Message bubble ──────────────────────────── */
  function MessageBubble(props) {
    var isUser = props.role === 'user';
    var delayMs = (props.index || 0) * 40;
    return CE('div', { className: isUser ? 'msg-row-user' : 'msg-row-ai' },
      CE('div', {
        className: 'msg-col ' + (isUser ? 'msg-col-user' : 'msg-col-ai'),
        style: { animationDelay: delayMs + 'ms' },
      },
        CE('span', { className: 'msg-label' }, isUser ? 'YOU' : 'AEON'),
        CE('div', { className: 'msg-bubble ' + (isUser ? 'msg-bubble-user' : 'msg-bubble-ai') },
          props.content
        )
      )
    );
  }

  /* ── Empty state ─────────────────────────────── */
  function EmptyState(props) {
    var chips = [
      'Explain quantum entanglement',
      'Write a noir detective opening',
      'Decode market sentiment signals',
      'Compose a haiku about entropy',
    ];
    var chipClasses = ['chip-d1', 'chip-d2', 'chip-d3', 'chip-d4'];

    return CE('div', { className: 'aeon-empty' },
      CE('div', { className: 'aeon-orb' }, 'a'),
      CE('h1', { className: 'aeon-headline' },
        'What shall we', CE('br'), CE('em', null, 'explore today?')
      ),
      CE('p', { className: 'aeon-sub' },
        'Intelligence without limits — ask anything, create everything.'
      ),
      CE('div', { className: 'aeon-chips' },
        chips.map(function(s, i) {
          return CE('button', {
            key: s,
            className: 'aeon-chip ' + chipClasses[i],
            onClick: function() { props.onSuggest(s); },
          }, s);
        })
      )
    );
  }

  /* ── Input bar ───────────────────────────────── */
  function InputBar(props) {
    var active = props.value.trim().length > 0 && !props.loading;
    return CE('div', { className: 'aeon-bar' },
      CE('textarea', {
        ref: props.taRef,
        className: 'aeon-ta',
        value: props.value,
        onChange: props.onChange,
        onKeyDown: props.onKeyDown,
        placeholder: 'Send a message…',
        rows: 1,
      }),
      CE('button', {
        className: 'aeon-send ' + (active ? 'on' : 'off'),
        onClick: props.onSend,
        disabled: !active,
        'aria-label': 'Send',
      },
        CE('svg', { width: 16, height: 16, viewBox: '0 0 16 16', fill: 'none' },
          CE('path', {
            d: 'M2 14L14 8L2 2V7L10 8L2 9V14Z',
            fill: active ? '#07070d' : 'rgba(255,255,255,0.28)',
          })
        )
      )
    );
  }

  /* ── App ─────────────────────────────────────── */
  function App() {
    var seed = window.CHAT_HISTORY || [];

    var s1 = useState(seed);
    var messages = s1[0], setMessages = s1[1];

    var s2 = useState('');
    var input = s2[0], setInput = s2[1];

    var s3 = useState(false);
    var isTyping = s3[0], setIsTyping = s3[1];

    var s4 = useState(false);
    var isLoading = s4[0], setIsLoading = s4[1];

    var endRef = useRef(null);
    var taRef  = useRef(null);

    useEffect(function() {
      if (endRef.current) {
        endRef.current.scrollIntoView({ behavior: 'smooth' });
      }
    }, [messages, isTyping]);

    function autoResize() {
      var ta = taRef.current;
      if (!ta) return;
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
    }

    function handleChange(e) {
      setInput(e.target.value);
      autoResize();
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    }

    function handleSend() {
      var text = input.trim();
      if (!text || isLoading) return;

      setInput('');
      if (taRef.current) taRef.current.style.height = 'auto';

      setMessages(function(prev) {
        return prev.concat([{ role: 'user', content: text }]);
      });
      setIsTyping(true);
      setIsLoading(true);

      fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var reply = d.response || d.message || d.reply || d.content || '';
          setMessages(function(prev) {
            return prev.concat([{ role: 'assistant', content: reply }]);
          });
        })
        .catch(function() {
          setMessages(function(prev) {
            return prev.concat([{ role: 'assistant', content: 'Something went wrong. Please try again.' }]);
          });
        })
        .finally(function() {
          setIsTyping(false);
          setIsLoading(false);
        });
    }

    function handleSuggest(text) {
      setInput(text);
      if (taRef.current) { taRef.current.focus(); setTimeout(autoResize, 0); }
    }

    var hasMessages = messages.length > 0;

    return CE(React.Fragment, null,
      CE(Navbar),

      CE('div', { className: 'aeon-chat-wrap' },
        CE('div', { className: 'aeon-chat-scroll aeon-scroll' },
          CE('div', { className: 'aeon-chat-inner' },

            !hasMessages && CE(EmptyState, { onSuggest: handleSuggest }),

            hasMessages && messages.map(function(m, i) {
              return CE(MessageBubble, { key: i, role: m.role, content: m.content, index: i });
            }),

            isTyping && CE(TypingIndicator),

            CE('div', { ref: endRef })
          )
        )
      ),

      CE(InputBar, {
        taRef: taRef,
        value: input,
        onChange: handleChange,
        onKeyDown: handleKeyDown,
        onSend: handleSend,
        loading: isLoading,
      })
    );
  }

  /* ── Mount ───────────────────────────────────── */
